name: Build FAP

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Skontroluje každý deň o 8:00 UTC, či Unleashed vydal novú OFICIÁLNU (release) verziu
    - cron: '0 8 * * *'

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check latest official Unleashed release version
        id: check
        run: |
          LATEST=$(curl -s https://up.unleashedflip.com/directory.json | jq -r '.channels[] | select(.id=="release") | .versions[0].version')
          echo "Latest official version: $LATEST"
          LAST=""
          if [ -f last_release_version.txt ]; then
            LAST=$(cat last_release_version.txt)
          fi
          echo "Last built version: $LAST"
          if [ "$LATEST" != "$LAST" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uFBT
        run: |
          python -m pip install --upgrade pip
          pip install ufbt

      - name: Update uFBT SDK (najnovšia oficiálna release verzia)
        run: |
          ufbt update --channel=release --index-url=https://up.unleashedflip.com/directory.json

      - name: Build Application
        run: |
          ufbt

      - name: Locate built .fap
        id: fap
        run: |
          FAP=$(ls dist/*.fap 2>/dev/null | head -n1)
          if [ -z "$FAP" ]; then
            FAP=$(ls .ufbt/build/*.fap 2>/dev/null | head -n1)
          fi
          echo "Found: $FAP"
          echo "path=$FAP" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ needs.check.outputs.version }}
          name: BoxOfMusic build pre ${{ needs.check.outputs.version }}
          body: |
            Automaticky vytvorený build appky BoxOfMusic pre oficiálnu Unleashed verziu **${{ needs.check.outputs.version }}**.
          files: ${{ steps.fap.outputs.path }}

      - name: Update last built version marker
        run: |
          echo "${{ needs.check.outputs.version }}" > last_release_version.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_release_version.txt
          git commit -m "Update last built version to ${{ needs.check.outputs.version }}" || echo "No changes to commit"
          git push
